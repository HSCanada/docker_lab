networks:
  mynetwork:
    external: true
services:
  app:
    image: 'jc21/nginx-proxy-manager:2'
    restart: unless-stopped
    networks: 
      - mynetwork
    environment:
      TZ: "America/Toronto"
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - npm_data:/data
      - ./letsencrypt:/etc/letsencrypt

volumes:
  npm_data:
